name: Publish Python package to TestPyPI

on:
  push:
    branches:
      - master

  # allow running manually from the Actions tab
  workflow_dispatch:

# allow only one concurrent deployment, but do NOT cancel in-progress runs,
# as we want to allow these deployments to complete
concurrency:
  group: "TestPyPI"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TestPyPI
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # fetch origin/master to compare it to current branch

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.0.2
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: false

      # set version (e.g. 1.2.3) from the latest Git tag on master branch
      - name: Set package release version
        # :1 changes "v1.2.3" to "1.2.3", where "v1.2.3" is tag string
        # timestamp "YYYYMMDDHHMMSS" is added at the end
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          uv version ${LATEST_TAG:1}.$(date +'%Y%m%d%H%M%S')
        shell: bash

      - name: Build
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
