name: Tests & checks

on:
  pull_request:
  workflow_dispatch: # allow running manually from the Actions tab

# cancel previous runs on a new commit
concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # fetch origin/master to compare it to current branch

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.0.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e  # v1

      # make sure cache directory exists at this stage, otherwise cache
      # will always be ignored
      - name: Create dataset cache directory
        run: mkdir -p ~/scikit_learn_data

      - name: Cache datasets
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          # GitHub Actions can't create a cache key on dataset contents, so we use
          # dataset loader .py files instead
          path: ~/scikit_learn_data
          key: datasets-${{ runner.os }}-${{ hashFiles('skfp/datasets/**/*.py') }}

      - name: Install the project dependencies
        run: uv sync --group test --group docs

      - name: Check pre-commit
        run: uv run pre-commit run --all-files

      - name: Audit uv dependencies
        run: uv audit --preview-features audit

      - name: Run tests with pytest
        run: uv run make test

      - name: Run docstring tests
        run: uv run make -C docs doctest
