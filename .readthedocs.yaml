version: 2

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  jobs:
    build:
      html:
        - uv run make -C docs html SPHINXBUILD="uv run sphinx-build"
        - cp -r docs/_build/html $READTHEDOCS_OUTPUT
