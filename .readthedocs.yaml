version: 2

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  jobs:
    build:
      html:
        - echo $READTHEDOCS_OUTPUT/html/
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - make -C docs html
        - cp -r docs/_build/html $READTHEDOCS_OUTPUT
